<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Weather App - Proiect Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>🌤️ Weather App</h1>
        
        <div class="search-section">
            <input type="text" id="city-input" placeholder="Introdu orașul...">
            <select id="unit-select">
                <option value="metric">Celsius (°C)</option>
                <option value="imperial">Fahrenheit (°F)</option>
                <option value="standard">Kelvin (K)</option>
            </select>
            <button id="search-btn">Caută</button>
            <button id="geo-btn">📍 Locația mea</button>
        </div>

        <div id="history-section">
            <span>Căutări recente:</span>
            <div id="history-list"></div>
        </div>

        <div id="weather-display" class="hidden">
            <h2 id="city-display">---</h2>
            <div id="temp-display">--</div>
            <p id="desc-display">--</p>
            <div class="details">
                <span id="wind-display">Vânt: --</span> | 
                <span id="hum-display">Umiditate: --</span>
            </div>
            <p id="recommendation"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
