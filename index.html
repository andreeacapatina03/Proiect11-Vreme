<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiect Vreme - Tehnologii Web</title>
    <link rel="stylesheet" href="style.css">
</head>
//modifjahfkf
<body> 
    <div class="card">
        <h1>🌤️ Weather App</h1>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Introdu orașul (ex: Iasi)">
            <select id="unit-select">
                <option value="metric">Celsius (°C)</option>
                <option value="imperial">Fahrenheit (°F)</option>
                <option value="standard">Kelvin (K)</option>
            </select>
            <button id="search-btn">Caută</button>
            <button id="geo-btn" title="Locația mea">📍</button>
        </div>

        <div id="history-container">
            <p>Căutări recente:</p>
            <div id="history-list"></div>
        </div>

        <div id="weather-result" class="hidden">
            <h2 id="city-name">---</h2>
            <div id="temp-display">--°</div>
            <p id="desc-display">--</p>
            <hr>
            <div class="details">
                <p id="wind-display">Vânt: --</p>
                <p id="hum-display">Umiditate: --</p>
            </div>
            <p id="recommendation"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
